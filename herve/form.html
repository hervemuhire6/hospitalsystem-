<html>
<head>
    <title>Appointment Form</title>
</head>

<body style="background-color:rgb(242,249,255);">

    <h1 style="color:rgb(0,51,102);">Book an Appointment</h1>
    <p><i>Uzuza amakuru yawe (Fill your details)</i></p>

    <h2 style="color:rgb(0,64,128);">Your Information</h2>

    <form>

        <label>Full Name (Amazina):</label><br>
        <input type="text"><br><br>

        <label>Phone Number (Telefoni):</label><br>
        <input type="text"><br><br>

        <label>Email (Imeli):</label><br>
        <input type="email"><br><br>

        <label>Age (Imyaka):</label><br>
        <input type="number"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female<br><br>

        <h2 style="color:rgb(0,64,128);">Appointment Details</h2>

        <label>Select Doctor (Hitamo muganga):</label><br>
        <select>
            <option>Dr. Herve</option>
            <option>Dr. Sarah</option>
            <option>Dr. Muhire</option>
        </select><br><br>

        <label>Department:</label><br>
        <select>
            <option>General</option>
            <option>Heart care</option>
            <option>Skin care</option>
        </select><br><br>

        <label>Date:</label><br>
        <input type="date"><br><br>

        <label>Time:</label><br>
        <select>
            <option>Morning</option>
            <option>Afternoon</option>
            <option>Evening</option>
        </select><br><br>

        <label>Problem (Ibibazo):</label><br>
        <textarea rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit" style="background-color:rgb(0,51,102); color:white;">
        <input type="reset" value="Clear" style="background-color:rgb(120,120,120); color:white;">

    </form>

    <h3 style="color:rgb(0,64,128);">Instructions</h3>
    <ul>
        <li>Fill all information</li>
        <li>Use correct phone number</li>
        <li>Come on time</li>
    </ul>

    <p>Murakoze cyane !</p>
<a href="index.html">Go to home  </a>
</body>
</html>
