<html>
<head>
<title>Appointment Form</title>
<style>
body{
background-color:rgb(242,249,255);
font-family:Arial,sans-serif;
margin:20px;
}
.container{
width:80%;
margin:auto;
background-color:white;
border:1px solid rgb(180,200,230);
padding:20px;
}
h1{
color:rgb(0,51,102);
text-align:center;
}
h2{
color:rgb(0,64,128);
border-bottom:2px solid rgb(0,64,128);
padding-bottom:5px;
}
h3{
color:rgb(0,64,128);
}
p{
font-size:16px;
}
form{
width:450px;
margin:auto;
background-color:rgb(250,250,250);
border:1px solid rgb(180,200,230);
padding:20px;
}
input[type="text"],
input[type="email"],
input[type="number"],
input[type="date"],
select,
textarea{
width:95%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border:1px solid rgb(150,150,150);
}
input[type="radio"]{
width:auto;
}
input[type="submit"]{
background-color:rgb(0,51,102);
color:white;
padding:8px 15px;
}
input[type="reset"]{
background-color:rgb(120,120,120);
color:white;
padding:8px 15px;
}
ul{
background-color:rgb(245,250,255);
border:1px solid rgb(180,200,230);
padding:15px 35px;
}
a{
background-color:rgb(0,64,128);
color:white;
text-decoration:none;
padding:10px 15px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Book an Appointment</h1>

<p align="center"><i>Uzuza amakuru yawe (Fill your details)</i></p>

<h2>Your Information</h2>

<form onsubmit="return submitForm()">

<label>Full Name (Amazina):</label><br>
<input type="text" id="name">

<label>Phone Number (Telefoni):</label><br>
<input type="text">

<label>Email (Imeli):</label><br>
<input type="email">

<label>Age (Imyaka):</label><br>
<input type="number">

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<br><br>

<h2>Appointment Details</h2>

<label>Select Doctor (Hitamo muganga):</label><br>
<select>
<option>Dr. Herve</option>
<option>Dr. Sarah</option>
<option>Dr. Muhire</option>
</select>

<label>Department:</label><br>
<select>
<option>General</option>
<option>Heart care</option>
<option>Skin care</option>
</select>

<label>Date:</label><br>
<input type="date">

<label>Time:</label><br>
<select>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>

<label>Problem (Ibibazo):</label><br>
<textarea rows="4"></textarea>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Clear">

</form>

<h3>Instructions</h3>

<ul>
<li>Fill all information.</li>
<li>Use the correct phone number.</li>
<li>Come on time.</li>
</ul>

<p align="center">Murakoze cyane!</p>

<p align="center">
<a href="javascript:void(0)" onclick="goHome()">Go to Home</a>
</p>

</div>

<script>
function submitForm(){

var name=document.getElementById("name").value;

if(name==""){
alert("Please enter your name.");
return false;
}
else{
alert("Appointment submitted successfully!");
return false;
}

}

function goHome(){

var answer=confirm("Do you want to return to the home page?");

if(answer){
window.location.href="index.html";
}

}
</script>

</body>
</html>
